    &lt;i&gt;🚀&lt;/i&gt;
    &lt;div&gt;&lt;strong&gt;Aksolagen — апрель рвёт все рекорды&lt;/strong&gt;
    2 100 404 ₽ выручки, ROAS 4,43x, заказы +166% к марту. При росте бюджета на 57% выручка выросла на 124% — это качественный рост, не просто масштаб. Апрель принёс больше, чем весь январь и февраль вместе взятые.&lt;/div&gt;

    &lt;div class=&quot;insight warn&quot;&gt;
      &lt;div class=&quot;i-title&quot;&gt;⚠️ It&#x27;s Collagen: корзины растут, заказы отстают&lt;/div&gt;
      &lt;p&gt;6 364 корзины в апреле — рекорд бренда (+91,7% к марту). Но конверсия корзина→заказ упала до 8,3% с 12,9% в марте. При 6 364 корзинах и конверсии как в марте (12,9%) заказов было бы ~820 вместо 527. Упущено ~293 заказа. Рекомендация: проверить наличие на складе, цену относительно конкурентов, количество и качество отзывов, скорость доставки.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;insight info&quot;&gt;
      &lt;div class=&quot;i-title&quot;&gt;🐾 Binn Pets: атрибуция — ключ к оценке окупаемости&lt;/div&gt;
      &lt;p&gt;ROAS по UTM-меткам: 1,43–1,86x — кажется убыточным. Но с ассоциированными продажами реальная окупаемость достигает 2,21x–3,47x. В апреле ассоциированные продажи (174 459 ₽) превышают UTM-продажи (149 533 ₽). Это продукт с длинным циклом решения: зоотовары покупают обдуманно. Принимать решения о блогерах только по UTM-ROAS ошибочно.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;insight neg&quot;&gt;
      &lt;div class=&quot;i-title&quot;&gt;📉 Binn Pets: переходы и корзины снижаются с марта&lt;/div&gt;
      &lt;p&gt;Март: 2 802 перехода / 401 корзина. Апрель: 2 777 / 388 — плато по охватам. Заказы упали с 91 до 54 (−40,7%) по UTM. При этом итоговая выручка выросла за счёт ассоц. продаж. Бренду нужен пересмотр подбора блогеров: сейчас все 6 интеграций апреля небольшие (≤860 переходов). Нужен 1–2 крупных блогера с широким охватом для роста воронки.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;insight pos&quot;&gt;
      &lt;div class=&quot;i-title&quot;&gt;📈 Общий ROAS апреля выше Q1: 3,95x vs 3,47x&lt;/div&gt;
      &lt;p&gt;Несмотря на рост бюджета (+47% к среднему месяцу Q1), суммарный ROAS апреля вырос. Это означает, что масштабирование идёт эффективно: новые бюджеты отрабатываются лучше, чем предыдущие. Основной вклад — Aksolagen с ROAS 4,43x при крупнейшем бюджете 474 578 ₽.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;insight warn&quot;&gt;
      &lt;div class=&quot;i-title&quot;&gt;🛒 Корзины — опережающий индикатор выручки следующего месяца&lt;/div&gt;
      &lt;p&gt;В апреле суммарно 15 679 корзин по 3 брендам. Если конверсия останется на уровне Q1 (9,2%), это означает потенциал ~1 442 заказа органически. Для Aksolagen критично удержать конверсию 11,7%+ в мае — это должно выразиться в росте органических продаж. Мониторить корзины нужно еженедельно как ранний сигнал.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

&lt;style&gt;
:root{

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx1);font-family:var(--font-b);font-size:14px;line-height:1.6}

/* ── HEADER ── */
.hdr{

  background:radial-gradient(circle,rgba(255,107,53,.05) 0%,transparent 70%);pointer-events:none}

  border:1px solid rgba(0,229,160,.3);border-radius:9px;padding:14px 20px}
.apr-badge .kpi-l{color:var(--green)}
.apr-badge .kpi-v{color:var(--green)}

.nav{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 52px;display:flex;gap:0;overflow-x:auto;position:sticky;top:0;z-index:100}
.nbt{background:none;border:none;color:var(--tx2);font-family:var(--font-b);

/* ── CONTENT ── */
.content{padding:40px 52px;max-width:1440px}
.section{display:none;animation:fi .3s ease}
.section.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}

      &lt;div class=&quot;it&quot;&gt;It&#x27;s Collagen — ROMI 581%: реклама вернула 6.8 руб. на 1 руб.&lt;/div&gt;
      &lt;div class=&quot;id&quot;&gt;Апрельская выручка IC составила &lt;b&gt;1 223 670 ₽&lt;/b&gt; при расходе 179 704 ₽. Это &lt;b&gt;лучший месяц за всё время&lt;/b&gt; наблюдений. Рост выручки к марту: +246%. Неделя 13.04–19.04 принесла 357 039 ₽ — рекорд недели. Алгоритмы Директа вышли на пиковую эффективность.&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ic2 pos&quot;&gt;
      &lt;div class=&quot;ii&quot;&gt;🔥&lt;/div&gt;
      &lt;div class=&quot;it&quot;&gt;Aksolagen — разворот с −14% до +499% ROMI за один месяц&lt;/div&gt;
      &lt;div class=&quot;id&quot;&gt;AKS весь Q1 работал в минус или на грани: ROMI март −13.7%. В апреле &lt;b&gt;выручка взлетела до 436 041 ₽&lt;/b&gt; (расход 72 832 ₽). Особенно мощная неделя 27.04–03.05: выручка в окне 333 869 ₽ — отложенные продажи материализовались. ДРР сократился с 115.9% до &lt;b&gt;16.7%&lt;/b&gt;.&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ic2 pos&quot;&gt;
      &lt;div class=&quot;ii&quot;&gt;🛒&lt;/div&gt;
      &lt;div class=&quot;it&quot;&gt;Корзины: трёхкратный рост за апрель — алгоритмы «разогрелись»&lt;/div&gt;
      &lt;div class=&quot;id&quot;&gt;IC: 762 корзины в марте → 2 371 в апреле (&lt;b&gt;+211%&lt;/b&gt;). AKS: 323 → 824 (&lt;b&gt;+155%&lt;/b&gt;). Особенно выделяется неделя 27.04–03.05: IC собрала 873 корзины за 7 дней — &lt;b&gt;рекорд всего периода наблюдений&lt;/b&gt;. Пиковый объём корзин говорит о высоком интересе аудитории и качестве таргетинга.&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ic2 pos&quot;&gt;
      &lt;div class=&quot;ii&quot;&gt;📉&lt;/div&gt;
      &lt;div class=&quot;it&quot;&gt;ЦПД обновил минимумы: IC 33 ₽, AKS 48 ₽ на пике&lt;/div&gt;
